model:
  hf_id: Qwen/Qwen2.5-7B-Instruct
  dtype: fp16
  attn_impl: eager
  max_context: 4096
  # Qwen2.5-7B uses GQA (28 query heads, 4 KV heads); the cross-model
  # robustness run (Llama->Qwen frozen weights) lives in xqp/robustness.py.
  n_kv_heads: 4

trace:
  workload: mooncake-chat
  n_traces: 200
  r_label: 0.10
  horizons: [1, 4, 16, 64]

predictor:
  variant: closed_form
  per_layer: false
  l2: 0.001
  val_frac: 0.20
  # GQA changes the per-block EMA scale; normalize before fitting (R11/R20).
  normalize_features: true

deploy:
  backend: tensorrt
  precision: fp16
  static_batch: 4096
  cuda_graph: true

policy:
  n_sink: 4
  n_window: 4
  r_cross: 0.10
  w_recency: 64.0
  fallback_p_threshold: 0.4
  fallback_window: 100
  recovery_tau: 16
