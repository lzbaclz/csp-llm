model:
  # Actually-run path: /public/model_zoo/Qwen3-8B (local, offline).
  hf_id: Qwen/Qwen3-8B
  dtype: fp16
  attn_impl: eager
  max_context: 4096
  # Qwen3-8B: 36 layers, QK-RMSNorm attention (no QKV bias) — the most
  # architecturally distinct of the Qwen line; used as a cross-family point
  # in the ICDM multi-architecture evaluation (paper_icdm §5).
  n_kv_heads: 8

trace:
  workload: mooncake
  n_traces: 32
  r_label: 0.10
  horizons: [1, 4, 16, 64]

predictor:
  variant: closed_form
  per_layer: false
  l2: 0.001
  val_frac: 0.20
  normalize_features: true

policy:
  n_sink: 4
  n_window: 4
  r_cross: 0.10
  w_recency: 64.0
  fallback_p_threshold: 0.4
  fallback_window: 100
  recovery_tau: 16
